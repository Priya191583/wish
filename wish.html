<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 3D Journey ✨</title>
    <style>
        :root { 
            --pink: #ffb6c1; 
            --dark-pink: #ff69b4; 
            --env-color: #fce4ec; 
            --env-shadow: #f06292;
        }
        body, html { 
            margin: 0; padding: 0; height: 100vh; 
            background: #fff5f7; font-family: 'Segoe UI', cursive; 
            overflow: hidden; 
        }

        #ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 100; color: var(--dark-pink); text-shadow: 0 0 10px white; transition: opacity 0.8s; }
        #view-btn { margin-top: 20px; padding: 15px 30px; font-size: 1.2rem; background-color: var(--dark-pink); color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4); }
        #music-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; padding: 10px 20px; border-radius: 30px; border: 2px solid var(--dark-pink); background: white; color: var(--dark-pink); cursor: pointer; font-weight: bold; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

        /* ENVELOPE SECTION */
        #envelope-wrapper {
            position: fixed; top: 60%; left: 50%; transform: translate(-50%, -50%);
            display: none; z-index: 200; cursor: pointer;
            opacity: 0; transition: opacity 1s ease-in;
        }

        .envelope-container { position: relative; width: 320px; height: 220px; perspective: 1000px; }
        .envelope { position: relative; width: 100%; height: 100%; background: var(--env-color); border-radius: 0 0 10px 10px; box-shadow: 0 15px 35px rgba(240, 98, 146, 0.3); z-index: 10; }
        .envelope::after { content: ""; position: absolute; z-index: 15; width: 0; height: 0; border-left: 160px solid transparent; border-right: 160px solid transparent; border-bottom: 110px solid #f8bbd0; bottom: 0; left: 0; border-radius: 0 0 10px 10px; }
        .envelope::before { content: ""; position: absolute; z-index: 14; width: 0; height: 0; border-top: 110px solid transparent; border-bottom: 110px solid transparent; border-left: 160px solid #f48fb1; top: 0; left: 0; }
        .flap { position: absolute; top: 0; left: 0; width: 0; height: 0; border-left: 160px solid transparent; border-right: 160px solid transparent; border-top: 115px solid #ec407a; transform-origin: top; transition: transform 0.6s ease; z-index: 20; }
        .open .flap { transform: rotateX(180deg); }
        .seal { position: absolute; top: 90px; left: 140px; width: 40px; height: 40px; background: #ffd700; border-radius: 50%; z-index: 25; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: opacity 0.3s; }
        .open .seal { opacity: 0; pointer-events: none; }

        .card {
            position: absolute; bottom: 5px; left: 10px; width: 300px; height: 190px; background: white; padding: 20px; border-radius: 8px; box-sizing: border-box; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5; text-align: center; color: #ad1457; box-shadow: 0 0 20px rgba(0,0,0,0.1); border: 1px solid #fce4ec;
        }
        .open .card { transform: translateY(-200px); z-index: 30; height: auto; min-height: 300px; }

        #click-me { position: absolute; top: -50px; width: 100%; text-align: center; color: var(--dark-pink); font-weight: bold; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }
    </style>
</head>
<body>

<button id="music-toggle">🎵 Play Our Song</button>

<div id="ui">
    <h1 style="font-size: 3.5rem;">Happy 4th yr Love Anniversary!</h1>
    <h2 style="font-size: 2.5rem;">MAMA ♡♡!!</h2>
    <button id="view-btn">Click to View Photos ❤️</button>
</div>

<div id="canvas-container"></div>

<div id="envelope-wrapper">
    <div id="click-me">A special letter for you 💌</div>
    <div class="envelope-container" id="main-env-container">
        <div class="flap"></div>
        <div class="seal">❤</div>
        <div class="envelope"></div>
        <div class="card">
            <h3 style="font-family: 'Brush Script MT', cursive; font-size: 1.8rem; margin-bottom: 10px;">To My Dearest Mama,</h3>
            <p>Every single day with you feels like a beautiful dream.</p>
            <p>Thank you for these 4 wonderful years of love and laughter.</p>
            <p style="font-size: 1.4rem; font-weight: bold; margin-top: 15px;">I Love U as always....♡!!</p>
            <div style="font-size: 2rem; margin-top: 10px;">🌹💖💍</div>
        </div>
    </div>
</div>

<audio id="bg-music" loop preload="auto">
    <source src="song.mp3.mp3" type="audio/mpeg">
</audio>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const loader = new THREE.TextureLoader();
    const photos = ['photo1.jpg', 'photo2.jpg', 'photo3.jpeg'];
    const photoGroup = new THREE.Group();
    const photoPlanes = [];
    photoGroup.visible = false;

    photos.forEach((url, i) => {
        const mesh = new THREE.Mesh(
            new THREE.PlaneGeometry(8, 11),
            new THREE.MeshBasicMaterial({ map: loader.load(url), side: THREE.DoubleSide, transparent: true, opacity: 0 })
        );
        mesh.position.set(i * 18, 0, 0); 
        photoGroup.add(mesh);
        photoPlanes.push(mesh);
    });
    scene.add(photoGroup);

    const hearts = [];
    const heartShape = new THREE.Shape();
    heartShape.moveTo(0,0); heartShape.bezierCurveTo(0,-0.3,-0.6,-0.3,-0.6,0);
    heartShape.bezierCurveTo(-0.6,0.3,0,0.6,0,1); heartShape.bezierCurveTo(0,0.6,0.6,0.3,0.6,0);
    heartShape.bezierCurveTo(0.6,-0.3,0,-0.3,0,0);
    for(let i=0; i<60; i++) {
        const heart = new THREE.Mesh(new THREE.ShapeGeometry(heartShape), new THREE.MeshBasicMaterial({ color: 0xff69b4, side: THREE.DoubleSide }));
        heart.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*60, (Math.random()-0.5)*30);
        heart.rotation.x = Math.PI; scene.add(heart); hearts.push(heart);
    }

    camera.position.z = 15;
    let started = false;
    let stopped = false;
    const audio = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-toggle');

    // AUTO-PLAY LOGIC: Triggered by the main button click
    document.getElementById('view-btn').onclick = () => {
        started = true;
        
        // Start the music automatically here
        audio.play().catch(e => console.log("Audio play failed:", e));
        musicBtn.innerText = "⏸ Pause Magic";

        document.getElementById('ui').style.opacity = '0';
        document.getElementById('ui').style.pointerEvents = 'none';
        photoGroup.visible = true;
        photoPlanes.forEach(p => {
            let fade = setInterval(() => { if(p.material.opacity < 1) p.material.opacity += 0.05; else clearInterval(fade); }, 30);
        });
    };

    function animate() {
        requestAnimationFrame(animate);
        if(started && !stopped) {
            photoGroup.position.x -= 0.03; 
            if (photoGroup.position.x <= -36) {
                photoGroup.position.x = -36;
                stopped = true;
                handleTransition();
            }
        }
        hearts.forEach(h => { h.position.y += 0.02; if(h.position.y > 30) h.position.y = -30; });
        renderer.render(scene, camera);
    }

    function handleTransition() {
        let fadeOut = setInterval(() => {
            let stillVisible = false;
            photoPlanes.forEach(p => {
                if(p.material.opacity > 0) {
                    p.material.opacity -= 0.02;
                    stillVisible = true;
                }
            });
            if(!stillVisible) {
                clearInterval(fadeOut);
                photoGroup.visible = false;
                const env = document.getElementById('envelope-wrapper');
                env.style.display = 'block';
                setTimeout(() => env.style.opacity = '1', 100);
            }
        }, 30);
    }

    const envWrapper = document.getElementById('main-env-container');
    envWrapper.onclick = () => {
        envWrapper.classList.toggle('open');
        document.getElementById('click-me').style.opacity = '0';
    };

    musicBtn.onclick = () => { 
        if(audio.paused) { audio.play(); musicBtn.innerText = "⏸ Pause Magic"; } 
        else { audio.pause(); musicBtn.innerText = "🎵 Play Music"; } 
    };
    
    animate();
</script>
</body>
</html>
